<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Django Interview Demo{% endblock %}</title>
  <style>
    :root {
      --bg: #f5efe6;
      --bg-soft: #fffaf2;
      --panel: rgba(255, 251, 245, 0.9);
      --ink: #1e1a16;
      --muted: #62564a;
      --line: rgba(58, 43, 30, 0.14);
      --accent: #ba4a00;
      --accent-strong: #8a3400;
      --ok: #29604f;
      --warn: #8a5a00;
      --danger: #8b2f39;
      --shadow: 0 22px 50px rgba(49, 33, 18, 0.08);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 215, 168, 0.7), transparent 32%),
        radial-gradient(circle at top right, rgba(233, 191, 133, 0.45), transparent 25%),
        linear-gradient(180deg, #fff7ea 0%, var(--bg) 54%, #efe6d8 100%);
      min-height: 100vh;
    }

    a {
      color: inherit;
    }

    .site-shell {
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 1.2rem 0 3rem;
    }

    .site-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.3rem;
      margin-top: 0.8rem;
      border: 1px solid var(--line);
      background: rgba(255, 252, 247, 0.7);
      backdrop-filter: blur(18px);
      border-radius: 999px;
      box-shadow: var(--shadow);
    }

    .brand {
      font-family: "Iowan Old Style", "Georgia", serif;
      font-size: 1.15rem;
      letter-spacing: 0.04em;
      text-decoration: none;
    }

    .nav-links,
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .nav-pill,
    .button,
    button,
    input[type="submit"] {
      border: 0;
      border-radius: 999px;
      padding: 0.8rem 1.1rem;
      background: var(--accent);
      color: #fff8f1;
      font: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease;
    }

    .nav-pill:hover,
    .button:hover,
    button:hover,
    input[type="submit"]:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    .button.secondary,
    .nav-pill.secondary {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    main {
      padding-top: 1.5rem;
    }

    .messages {
      display: grid;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .message {
      padding: 0.95rem 1.1rem;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.76);
      box-shadow: var(--shadow);
    }

    .layout-grid {
      display: grid;
      gap: 1rem;
    }

    .card,
    .panel {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .card {
      padding: 1.4rem;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.7fr 1fr;
      gap: 1rem;
      align-items: stretch;
    }

    .hero-copy,
    .hero-aside {
      padding: 2rem;
    }

    .eyebrow {
      display: inline-block;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: rgba(186, 74, 0, 0.12);
      color: var(--accent-strong);
      font-size: 0.88rem;
      margin-bottom: 1rem;
    }

    h1,
    h2,
    h3 {
      font-family: "Iowan Old Style", "Georgia", serif;
      margin: 0 0 0.8rem;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 0.98;
    }

    p {
      margin: 0 0 1rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .feature-grid,
    .stats-grid,
    .task-grid,
    .two-col {
      display: grid;
      gap: 1rem;
    }

    .feature-grid,
    .stats-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .two-col {
      grid-template-columns: 320px minmax(0, 1fr);
    }

    .task-grid {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .kicker {
      color: var(--muted);
      font-size: 0.92rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .badge-row,
    .meta-row,
    .action-row {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.72rem;
      border-radius: 999px;
      font-size: 0.88rem;
      background: rgba(30, 26, 22, 0.06);
    }

    .badge.todo {
      background: rgba(138, 90, 0, 0.14);
      color: var(--warn);
    }

    .badge.in_progress {
      background: rgba(41, 96, 79, 0.12);
      color: var(--ok);
    }

    .badge.done {
      background: rgba(41, 96, 79, 0.16);
      color: var(--ok);
    }

    .badge.high {
      background: rgba(139, 47, 57, 0.12);
      color: var(--danger);
    }

    .badge.medium {
      background: rgba(186, 74, 0, 0.12);
      color: var(--accent-strong);
    }

    .badge.low {
      background: rgba(30, 26, 22, 0.08);
      color: var(--muted);
    }

    .task-card h3 {
      margin-bottom: 0.35rem;
    }

    .task-card p {
      margin-bottom: 0.8rem;
    }

    .field {
      display: grid;
      gap: 0.45rem;
      margin-bottom: 1rem;
    }

    .field label {
      font-weight: 600;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(58, 43, 30, 0.18);
      background: rgba(255, 255, 255, 0.86);
      padding: 0.9rem 1rem;
      font: inherit;
      color: var(--ink);
    }

    .field input[type="checkbox"] {
      width: auto;
    }

    .helptext {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .errorlist {
      margin: 0;
      padding-left: 1.1rem;
      color: var(--danger);
    }

    .muted {
      color: var(--muted);
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
    }

    .pagination {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      margin-top: 1rem;
    }

    .code-block {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 18px;
      background: #201913;
      color: #fff6ee;
      overflow: auto;
      font-family: "SFMono-Regular", "Consolas", monospace;
      font-size: 0.92rem;
    }

    @media (max-width: 900px) {

      .hero,
      .feature-grid,
      .stats-grid,
      .two-col {
        grid-template-columns: 1fr;
      }

      .site-nav {
        border-radius: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="site-shell">
    <nav class="site-nav">
      <div class="nav-links">
        <a class="brand" href="{% url 'tasks:home' %}">Django Interview
          Demo</a>
        <a href="{% url 'tasks:list' %}">Задачи</a>
        <a href="/admin/">Админка</a>
      </div>
      <div class="nav-actions">
        {% if user.is_authenticated %}
        <span class="muted">{{ user.username }}</span>
        <a class="nav-pill secondary" href="{% url 'tasks:create' %}">Новая
          задача</a>
        <form action="{% url 'logout' %}" method="post">
          {% csrf_token %}
          <button type="submit">Выйти</button>
        </form>
        {% else %}
        <a class="nav-pill secondary" href="{% url 'login' %}">Войти</a>
        <a class="nav-pill" href="{% url 'tasks:signup' %}">Регистрация</a>
        {% endif %}
      </div>
    </nav>

    <main>
      {% if messages %}
      <div class="messages">
        {% for message in messages %}
        <div class="message">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}

      {% block content %}{% endblock %}
    </main>
  </div>
</body>

</html>
